<input
  type="text"
  placeholder="Search Course"
  [(ngModel)]="searchTerm">

<br><br>

<div *ngIf="loading">
    Loading...
</div>

<div *ngIf="!loading">

    <div *ngIf="filteredCourses.length === 0">
        No Courses Found
    </div>

   <app-course-card

*ngFor="let course of filteredCourses"

[name]="course.title"

[code]="course.id"

[credits]="3"

[grade]="'A'">

</app-course-card>

</div>
